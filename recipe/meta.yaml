{% set name = "ascii_graph" %}
{% set version = "1.5.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 32ec5e8af8ac1b285cb0c3d1715b3e44d2152bff71f27cde60c3b5d23f98e0a4

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv "

requirements:
  host:
    - pip
    - python
  run:
    - python

test:
  imports:
    - ascii_graph

about:
  home: https://github.com/kakwa/py-ascii-graph
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A simple python lib to print data as ascii histograms.
  doc_url: https://py-ascii-graph.readthedocs.io/
  dev_url: https://github.com/kakwa/py-ascii-graph

extra:
  recipe-maintainers:
    - druvus
